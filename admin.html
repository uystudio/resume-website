<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 — 全站 CMS</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#1c1c1e;color:#f5f5f7;max-width:900px;margin:0 auto;padding:32px 20px 80px;}

/* 头部 */
h1{font-size:1.3rem;margin-bottom:4px}
.status{font-size:.7rem;color:#8e8e93;margin-left:8px;font-weight:400}
.back{font-size:.75rem;color:#8e8e93;margin-bottom:20px;display:inline-block;text-decoration:none}
.back:hover{color:#0a84ff}

/* Tab 切换 */
.tabs{display:flex;gap:4px;margin:24px 0;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:0}
.tab{padding:10px 16px;font-size:.8rem;cursor:pointer;border-radius:8px 8px 0 0;color:#8e8e93;transition:all .2s;border:none;background:transparent}
.tab:hover{color:#f5f5f7;background:rgba(255,255,255,0.04)}
.tab.active{color:#0a84ff;background:rgba(10,132,255,0.08)}

/* 面板 */
.panel{display:none}
.panel.active{display:block}

/* 通用 */
h2{font-size:.95rem;color:#98989d;margin:24px 0 14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.06)}

/* 表单 */
form{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.form-row{display:flex;gap:10px}
.form-row > *{flex:1}
form input,form textarea,form select{background:#3a3a3c;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 12px;color:#f5f5f7;font-size:.82rem;font-family:inherit}
form textarea{resize:vertical;min-height:50px}
form ::placeholder{color:#636366}
form label{font-size:.7rem;color:#8e8e93;text-transform:uppercase;letter-spacing:.05em;margin-bottom:-6px}
form button{width:fit-content;padding:9px 20px;border-radius:8px;border:none;background:#0a84ff;color:#fff;font-size:.82rem;font-weight:600;cursor:pointer;transition:opacity .2s}
form button:hover{opacity:.85}
form button.danger{background:#ff453a}
form button.secondary{background:transparent;border:1px solid rgba(255,255,255,0.1);color:#8e8e93;font-weight:400}
.inline-form{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.inline-form input{flex:1}

/* 列表 */
.list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.item{background:#2c2c2e;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;transition:border-color .2s,box-shadow .2s}
.item:hover{border-color:rgba(255,255,255,0.12)}
.item.drag-over{border-color:#0a84ff;box-shadow:0 0 0 1px rgba(10,132,255,0.3)}
.item.dragging{opacity:.4}
.drag-handle{cursor:grab;color:#636366;font-size:1.1rem;flex-shrink:0;user-select:none;padding:4px}
.drag-handle:active{cursor:grabbing}
.item img{width:60px;height:40px;object-fit:cover;border-radius:5px;background:#3a3a3c;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-info strong{display:block;font-size:.85rem;margin-bottom:2px}
.item-info .meta{font-size:.7rem;color:#8e8e93;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.tags-row{display:flex;gap:4px;flex-wrap:wrap}
.tag{display:inline-block;font-size:.65rem;padding:2px 8px;border-radius:10px;background:rgba(10,132,255,0.12);color:#0a84ff}
.featured-star{color:#ff9f0a;font-size:.85rem}
.item .btns{display:flex;gap:4px;flex-shrink:0}
.item button{padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:#8e8e93;cursor:pointer;font-size:.7rem;transition:all .2s}
.item button:hover{color:#f5f5f7;border-color:rgba(255,255,255,0.15)}
.item button.del-btn:hover{color:#ff453a;border-color:rgba(255,69,58,0.3)}
.empty{color:#636366;font-size:.8rem;text-align:center;padding:28px 0}

/* 文件上传 */
.file-label{display:inline-block;padding:8px 14px;border-radius:8px;border:1px dashed rgba(255,255,255,0.12);color:#8e8e93;font-size:.75rem;cursor:pointer;transition:border-color .2s;white-space:nowrap}
.file-label:hover{border-color:#0a84ff;color:#0a84ff}
input[type=file]{display:none}
.upload-status{font-size:.7rem;color:#30d158;display:none}
.upload-status.show{display:inline}
.check-row{display:flex;align-items:center;gap:8px;font-size:.8rem;color:#98989d}
.check-row input[type=checkbox]{accent-color:#0a84ff}

/* 弹窗 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#2c2c2e;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:24px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:1rem;margin-bottom:16px}

/* 消息 */
.msg{font-size:.78rem;padding:8px 12px;border-radius:8px;margin-bottom:12px;display:none}
.msg.ok{display:block;background:rgba(48,209,88,.12);color:#30d158;border:1px solid rgba(48,209,88,.15)}
.msg.err{display:block;background:rgba(255,69,58,.12);color:#ff453a;border:1px solid rgba(255,69,58,.15)}

/* 预览 */
.preview-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center}
.preview-bg.show{display:flex}
.preview-bg img,.preview-bg video{max-width:90vw;max-height:85vh;border-radius:12px}
.preview-close{position:absolute;top:20px;right:28px;font-size:1.8rem;color:#fff;cursor:pointer;z-index:201;opacity:.6}
.preview-close:hover{opacity:1}
.preview-title{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:#ccc;font-size:.85rem}

@media(max-width:640px){
  body{padding:20px 12px}
  h1{font-size:1.1rem}
  .item{flex-wrap:wrap;gap:10px}
  .item .btns{width:100%;justify-content:flex-end}
  .form-row{flex-direction:column;gap:8px}
  form button{width:100%}
  .modal{width:95%;padding:16px}
  form input,form textarea{font-size:16px}
}
</style>
</head>
<body>

<h1>全站管理 <span class="status" id="sync-status"></span></h1>
<a href="https://uystudio.github.io/resume-website/" class="back">← 返回首页</a>

<div class="setup" id="setup" style="display:none;background:#2c2c2e;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:18px;margin-bottom:24px">
  <p style="font-size:.84rem;margin-bottom:6px">需要 GitHub 授权令牌</p>
  <p style="font-size:.74rem;color:#8e8e93;margin-bottom:12px;line-height:1.6">
    后台通过它保存数据到你的 GitHub 仓库。<br>
    <b>获取方式：</b><a href="https://github.com/settings/tokens" target="_blank" style="color:#0a84ff">github.com/settings/tokens</a>
    → Generate new token (classic) → 勾选 <b>repo</b> → Generate → 复制
  </p>
  <input id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" style="width:100%;background:#3a3a3c;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 12px;color:#f5f5f7;font-size:.82rem;font-family:monospace">
  <button onclick="saveToken()" style="padding:9px 18px;border-radius:8px;border:none;background:#0a84ff;color:#fff;font-size:.82rem;font-weight:600;cursor:pointer;margin-top:8px">保存</button>
</div>

<div id="msg" class="msg"></div>

<!-- Tab 导航 -->
<div class="tabs">
  <button class="tab active" data-panel="panel-site">基本信息</button>
  <button class="tab" data-panel="panel-about">关于</button>
  <button class="tab" data-panel="panel-skills">技能</button>
  <button class="tab" data-panel="panel-projects">项目卡片</button>
  <button class="tab" data-panel="panel-gallery">作品集</button>
  <button class="tab" data-panel="panel-contact">联系</button>
  <button class="tab" data-panel="panel-footer">页脚</button>
</div>

<!-- 基本信息 -->
<div id="panel-site" class="panel active">
  <h2>基本信息</h2>
  <form id="site-form">
    <label>头像路径</label>
    <div class="form-row">
      <input name="avatar" placeholder="images/avatar.png">
      <label class="file-label" for="avatar-file">📁 上传</label>
      <input type="file" id="avatar-file" accept="image/*">
      <span class="upload-status" id="avatar-upload-status">✓</span>
    </div>
    <label>姓名</label>
    <input name="name" placeholder="帕尔哈提·艾力">
    <label>一句话介绍</label>
    <input name="tagline" placeholder="电商 / 前端 / 剪辑 — 新疆 · 营口">
    <button type="submit">保存基本信息</button>
  </form>
</div>

<!-- 关于 -->
<div id="panel-about" class="panel">
  <h2>关于 — 自我介绍</h2>
  <form id="about-text-form">
    <label>段落 1</label>
    <textarea name="p1" rows="3"></textarea>
    <label>段落 2</label>
    <textarea name="p2" rows="3"></textarea>
    <button type="submit">保存关于文字</button>
  </form>

  <h2>个人信息列表</h2>
  <div id="info-list" class="list"></div>
  <form class="inline-form" id="info-add-form">
    <input name="label" placeholder="标签（如：学校）" required>
    <input name="value" placeholder="内容（如：营口职业技术学院）" required>
    <button type="submit">添加</button>
  </form>
</div>

<!-- 技能 -->
<div id="panel-skills" class="panel">
  <h2>技能列表</h2>
  <div id="skill-list" class="list"></div>
  <form class="inline-form" id="skill-add-form">
    <input name="name" placeholder="技能名" required>
    <input name="level" placeholder="等级（如：熟练）" required>
    <input name="width" placeholder="进度 0-100" type="number" min="0" max="100" required style="max-width:80px">
    <button type="submit">添加</button>
  </form>
</div>

<!-- 项目卡片 -->
<div id="panel-projects" class="panel">
  <h2>项目卡片</h2>
  <div id="project-list" class="list"></div>
  <form class="inline-form" id="project-add-form">
    <input name="title" placeholder="标题" required>
    <input name="desc" placeholder="描述" required>
    <input name="chip" placeholder="标签文字" required>
    <button type="submit">添加</button>
  </form>
</div>

<!-- 作品集（视频/摄影/创作）-->
<div id="panel-gallery" class="panel">
  <div class="tabs" style="margin-top:0;border-bottom:1px solid rgba(255,255,255,0.06)">
    <button class="tab active" data-gallery="videos">视频</button>
    <button class="tab" data-gallery="photos">摄影</button>
    <button class="tab" data-gallery="creations">创作</button>
  </div>

  <div id="gallery-panel-videos" class="gallery-panel active">
    <h2>视频</h2>
    <div id="video-list" class="list"></div>
    <form id="video-form">
      <div class="form-row"><input name="title" placeholder="标题" required><input name="date" placeholder="日期（如 2025-03-15）"></div>
      <textarea name="desc" placeholder="描述"></textarea>
      <div class="form-row"><input name="tags" placeholder="标签（逗号分隔，如 风景,旅行）"></div>
      <div class="form-row">
        <input name="thumbnail" placeholder="封面路径" value="images/placeholder-video.svg">
        <label class="file-label" for="video-file">📁 上传</label>
        <input type="file" id="video-file" accept="image/*,video/*">
        <span class="upload-status" id="video-upload-status">✓</span>
      </div>
      <input name="url" placeholder="视频链接（可选）">
      <div class="check-row"><input type="checkbox" name="featured"> 精选（首页优先展示）</div>
      <button type="submit">添加视频</button>
    </form>
  </div>

  <div id="gallery-panel-photos" class="gallery-panel" style="display:none">
    <h2>摄影 / 图片</h2>
    <div id="photo-list" class="list"></div>
    <form id="photo-form">
      <div class="form-row"><input name="title" placeholder="标题" required><input name="date" placeholder="日期"></div>
      <textarea name="desc" placeholder="描述"></textarea>
      <div class="form-row"><input name="tags" placeholder="标签（逗号分隔）"></div>
      <div class="form-row">
        <input name="thumbnail" placeholder="封面路径" value="images/placeholder-photo.svg">
        <label class="file-label" for="photo-file">📁 上传</label>
        <input type="file" id="photo-file" accept="image/*">
        <span class="upload-status" id="photo-upload-status">✓</span>
      </div>
      <input name="url" placeholder="链接（可选）">
      <div class="check-row"><input type="checkbox" name="featured"> 精选</div>
      <button type="submit">添加图片</button>
    </form>
  </div>

  <div id="gallery-panel-creations" class="gallery-panel" style="display:none">
    <h2>创作</h2>
    <div id="creation-list" class="list"></div>
    <form id="creation-form">
      <div class="form-row"><input name="title" placeholder="标题" required><input name="date" placeholder="日期"></div>
      <textarea name="desc" placeholder="描述"></textarea>
      <div class="form-row"><input name="tags" placeholder="标签（逗号分隔）"></div>
      <div class="form-row">
        <input name="thumbnail" placeholder="封面路径" value="images/placeholder-photo.svg">
        <label class="file-label" for="creation-file">📁 上传</label>
        <input type="file" id="creation-file" accept="image/*">
        <span class="upload-status" id="creation-upload-status">✓</span>
      </div>
      <input name="url" placeholder="链接（可选）">
      <div class="check-row"><input type="checkbox" name="featured"> 精选</div>
      <button type="submit">添加创作</button>
    </form>
  </div>
</div>

<!-- 联系 -->
<div id="panel-contact" class="panel">
  <h2>联系方式</h2>
  <form id="contact-form">
    <label>介绍语</label>
    <input name="intro" placeholder="欢迎随时联系...">
    <label>邮箱</label>
    <input name="email" placeholder="example@qq.com">
    <label>电话</label>
    <input name="phone" placeholder="19239975723">
    <button type="submit">保存联系方式</button>
  </form>
</div>

<!-- 页脚 -->
<div id="panel-footer" class="panel">
  <h2>页脚信息</h2>
  <form id="footer-form">
    <label>姓名</label>
    <input name="name" placeholder="帕尔哈提·艾力">
    <label>学校信息</label>
    <input name="school" placeholder="营口职业技术学院 · 电子商务">
    <label>年份</label>
    <input name="year" placeholder="2025">
    <button type="submit">保存页脚</button>
  </form>
</div>

<!-- 编辑弹窗 -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>编辑</h3>
    <form id="edit-form">
      <div class="form-row"><input name="title" placeholder="标题" required><input name="date" placeholder="日期"></div>
      <textarea name="desc" placeholder="描述"></textarea>
      <div class="form-row"><input name="tags" placeholder="标签（逗号分隔）"></div>
      <div class="form-row">
        <input name="thumbnail" placeholder="封面路径">
        <label class="file-label" for="edit-file">📁 上传</label>
        <input type="file" id="edit-file" accept="image/*">
        <span class="upload-status" id="edit-upload-status">✓</span>
      </div>
      <input name="url" placeholder="链接">
      <div class="check-row"><input type="checkbox" name="featured"> 精选</div>
      <div class="form-row" style="margin-top:8px">
        <button type="submit">保存</button>
        <button type="button" class="secondary" onclick="closeModal()">取消</button>
      </div>
    </form>
  </div>
</div>

<!-- 预览弹窗 -->
<div class="preview-bg" id="preview-bg">
  <span class="preview-close" onclick="closePreview()">&times;</span>
  <div id="preview-content"></div>
  <span class="preview-title" id="preview-title"></span>
</div>

<script>
// ===== 状态 =====
const OWNER = 'uystudio', REPO = 'resume-website';
const GH_API = `https://api.github.com/repos/${OWNER}/${REPO}/contents`;
const RAW = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main`;
const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const RENDER_API = localStorage.getItem('render_api') || '';  // 在 Render 部署后设置后端地址

let token = localStorage.getItem('gh_token') || '';
let data = { site: {}, videos: [], photos: [], creations: [] };
let editing = null, dragSrc = null;
let activeGallery = 'videos';

// ===== Token =====
if (!token && location.hash) {
  var h = location.hash.substring(1);
  if (h.startsWith('gho_') || h.startsWith('ghp_')) {
    token = h; localStorage.setItem('gh_token', token);
    history.replaceState(null, '', location.pathname + location.search);
  }
}
if (isLocal || RENDER_API) { token = 'LOCAL'; localStorage.setItem('gh_token', token); }
document.getElementById('setup').style.display = token ? 'none' : 'block';

// ===== 工具 =====
function msg(text, ok) {
  var el = document.getElementById('msg');
  el.textContent = text; el.className = 'msg ' + (ok ? 'ok' : 'err');
  setTimeout(function(){ el.className = 'msg'; }, 2500);
}
function saveToken() {
  token = document.getElementById('token-input').value.trim();
  if (!token) return msg('请输入 Token', false);
  localStorage.setItem('gh_token', token);
  document.getElementById('setup').style.display = 'none';
  load();
}
function thumbSrc(path) {
  if (!path) return '';
  if (path.startsWith('http')) return path;
  return RAW + '/' + path;
}

// ===== Tab 切换 =====
document.querySelectorAll('.tab').forEach(function(t) {
  t.addEventListener('click', function() {
    var panelId = this.dataset.panel;
    var galleryType = this.dataset.gallery;
    if (panelId) {
      document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
      document.getElementById(panelId).classList.add('active');
      document.querySelectorAll('.tab[data-panel]').forEach(function(b){ b.classList.remove('active'); });
      this.classList.add('active');
      if (panelId === 'panel-gallery') {
        document.querySelector('.tab[data-gallery="' + activeGallery + '"]').classList.add('active');
      }
    }
    if (galleryType) {
      activeGallery = galleryType;
      document.querySelectorAll('.gallery-panel').forEach(function(p){ p.style.display = 'none'; });
      document.getElementById('gallery-panel-' + galleryType).style.display = 'block';
      document.querySelectorAll('.tab[data-gallery]').forEach(function(b){ b.classList.remove('active'); });
      this.classList.add('active');
    }
  });
});

// ===== GitHub API =====
async function gh(path, method, body) {
  var opts = { method: method || 'GET', headers: { Authorization: 'token ' + token, Accept: 'application/vnd.github.v3+json' } };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(GH_API + '/' + path, opts);
  if (!res.ok) { var err = await res.json().catch(function(){ return {}; }); throw new Error(err.message || res.statusText); }
  return res.json();
}

// ===== 文件上传 =====
async function uploadFile(inputEl, statusEl, thumbInput) {
  var file = inputEl.files[0];
  if (!file) return;
  statusEl.textContent = '...'; statusEl.classList.add('show');
  if (isLocal) {
    var fd = new FormData(); fd.append('file', file);
    try {
      var res = await fetch('/api/upload', { method: 'POST', body: fd });
      var d = await res.json();
      if (d.ok) { thumbInput.value = d.path; statusEl.textContent = '✓'; msg(d.preview ? '封面+预览已生成' : '已上传', true); }
      else { statusEl.textContent = '✗'; msg(d.error, false); }
    } catch(e) { statusEl.textContent = '✗'; msg('上传失败', false); }
  } else {
    try {
      if (file.size > 40*1024*1024) throw new Error('文件不能超过 40MB');
      var path = await new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = async function() {
          try {
            var binary = ''; var bytes = new Uint8Array(reader.result);
            for (var i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            var fname = 'images/' + Date.now() + '-' + Math.round(Math.random()*1e9) + '.' + file.name.split('.').pop();
            await gh(fname, 'PUT', { message: '上传 ' + file.name, content: btoa(binary) });
            resolve(fname);
          } catch(e) { reject(e); }
        };
        reader.onerror = function(){ reject(new Error('读取失败')); };
        reader.readAsArrayBuffer(file);
      });
      thumbInput.value = path; statusEl.textContent = '✓'; msg('已上传', true);
    } catch(e) { statusEl.textContent = '✗'; msg('上传失败: ' + e.message, false); }
  }
}

// ===== 保存 & 加载 =====
async function saveData(msgText) {
  document.getElementById('sync-status').textContent = '保存中...';
  if (isLocal) {
    await fetch('/api/portfolio/local-save', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    document.getElementById('sync-status').textContent = '✓ 已保存';
  } else {
    var file = await gh('data/portfolio.json').catch(function(){ return {}; });
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    await gh('data/portfolio.json', 'PUT', { message: msgText || '更新全站数据', content: content, sha: file.sha });
    document.getElementById('sync-status').textContent = '✓ 已同步';
  }
  setTimeout(function(){ document.getElementById('sync-status').textContent = ''; }, 2000);
}

async function load() {
  if (isLocal) {
    try { var res = await fetch('/api/portfolio'); data = await res.json(); } catch(e) { msg('本地后端未启动', false); }
  } else {
    if (!token) return;
    try { var file = await gh('data/portfolio.json'); data = JSON.parse(atob(file.content.replace(/\s/g, ''))); }
    catch(e) { document.getElementById('setup').style.display = 'block'; msg('Token 失效', false); }
  }
  if (!data.site) data.site = {};
  if (!data.site.about) data.site.about = ['', ''];
  if (!data.site.info) data.site.info = [];
  if (!data.site.skills) data.site.skills = [];
  if (!data.site.projects) data.site.projects = [];
  if (!data.site.contact) data.site.contact = {};
  if (!data.site.footer) data.site.footer = {};
  if (!data.videos) data.videos = [];
  if (!data.photos) data.photos = [];
  if (!data.creations) data.creations = [];
  renderAll();
  document.getElementById('sync-status').textContent = '✓ 已加载';
  setTimeout(function(){ document.getElementById('sync-status').textContent = ''; }, 2000);
}

// ===== 渲染全部 =====
function renderAll() {
  var s = data.site;
  var form = document.getElementById('site-form');
  form.avatar.value = s.avatar || '';
  form.name.value = s.name || '';
  form.tagline.value = s.tagline || '';

  document.getElementById('about-text-form').p1.value = (s.about && s.about[0]) || '';
  document.getElementById('about-text-form').p2.value = (s.about && s.about[1]) || '';

  renderSimpleList('info-list', s.info || [], ['label','value'], 'info');
  renderSimpleList('skill-list', s.skills || [], ['name','level','width'], 'skills');
  renderSimpleList('project-list', s.projects || [], ['title','desc','chip'], 'projects');

  document.getElementById('contact-form').intro.value = (s.contact && s.contact.intro) || '';
  document.getElementById('contact-form').email.value = (s.contact && s.contact.email) || '';
  document.getElementById('contact-form').phone.value = (s.contact && s.contact.phone) || '';

  document.getElementById('footer-form').name.value = (s.footer && s.footer.name) || '';
  document.getElementById('footer-form').school.value = (s.footer && s.footer.school) || '';
  document.getElementById('footer-form').year.value = (s.footer && s.footer.year) || '';

  renderGalleryList('video-list', data.videos || [], 'video');
  renderGalleryList('photo-list', data.photos || [], 'photo');
  renderGalleryList('creation-list', data.creations || [], 'creation');
}

// 简单列表（info/skills/projects）
function renderSimpleList(listId, items, fields, type) {
  var el = document.getElementById(listId);
  el.innerHTML = '';
  if (!items.length) { el.innerHTML = '<div class="empty">暂无内容</div>'; return; }
  items.forEach(function(item, i) {
    var div = document.createElement('div');
    div.className = 'item';
    div.draggable = true;
    div.dataset.index = i;
    var preview = '';
    if (type === 'info') {
      preview = '<span style="font-size:.7rem;color:#8e8e93">' + (item.label||'') + '</span> ' + (item.value||'');
    } else if (type === 'skills') {
      preview = '<strong>' + (item.name||'') + '</strong> <span style="color:#8e8e93">' + (item.level||'') + ' · ' + (item.width||0) + '%</span>';
    } else if (type === 'projects') {
      preview = '<strong>' + (item.title||'') + '</strong> <span style="color:#8e8e93">' + (item.desc||'') + '</span> <span class="tag">' + (item.chip||'') + '</span>';
    }
    div.innerHTML = '<span class="drag-handle">⋮⋮</span><div class="item-info">' + preview + '</div><div class="btns"><button>编辑</button><button class="del-btn">删除</button></div>';
    div.querySelector('.drag-handle').addEventListener('dragstart', function(e){ dragSrc = i; div.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    div.querySelector('.drag-handle').addEventListener('dragend', function(){ div.classList.remove('dragging'); });
    div.addEventListener('dragover', function(e){ e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', function(){ div.classList.remove('drag-over'); });
    div.addEventListener('drop', function(e){ e.preventDefault(); div.classList.remove('drag-over'); reorderSimple(items, dragSrc, i, type); });
    div.querySelector('button:first-child').onclick = function(){ editSimple(item, i, type); };
    div.querySelector('.del-btn').onclick = function(){ if(confirm('删除？')){ items.splice(i,1); saveData('删除'+type); renderAll(); msg('已删除', true); } };
    el.appendChild(div);
  });
}

function reorderSimple(items, from, to, type) {
  var item = items.splice(from, 1)[0];
  items.splice(to, 0, item);
  saveData('排序' + type); renderAll();
}

function editSimple(item, i, type) {
  if (type === 'info') {
    var label = prompt('标签', item.label || '');
    if (label === null) return;
    var value = prompt('内容', item.value || '');
    if (value === null) return;
    item.label = label; item.value = value;
  } else if (type === 'skills') {
    var name = prompt('技能名', item.name || '');
    if (name === null) return;
    var level = prompt('等级', item.level || '');
    if (level === null) return;
    var width = parseInt(prompt('进度 (0-100)', item.width || 0));
    if (isNaN(width)) return;
    item.name = name; item.level = level; item.width = width;
  } else if (type === 'projects') {
    var title = prompt('标题', item.title || '');
    if (title === null) return;
    var desc = prompt('描述', item.desc || '');
    if (desc === null) return;
    var chip = prompt('标签文字', item.chip || '');
    if (chip === null) return;
    item.title = title; item.desc = desc; item.chip = chip;
  }
  data.site[type][i] = item;
  saveData('编辑'+type); renderAll();
}

// 画廊列表（videos/photos/creations）
function renderGalleryList(listId, items, type) {
  var el = document.getElementById(listId);
  el.innerHTML = '';
  if (!items.length) { el.innerHTML = '<div class="empty">暂无内容</div>'; return; }
  // 按 order 排序
  items.sort(function(a,b){ return (a.order||0) - (b.order||0); });
  items.forEach(function(item, i) {
    delete item._idx; item._idx = i;
    var div = document.createElement('div');
    div.className = 'item';
    div.draggable = true;
    div.dataset.idx = i;
    var isVid = /\.(mp4|mov|avi|mkv|webm|flv)/i.test(item.thumbnail);
    var thumbHtml = isVid
      ? '<div style="width:60px;height:40px;border-radius:5px;background:#3a3a3c;display:flex;align-items:center;justify-content:center;flex-shrink:0">▶</div>'
      : '<img src="' + thumbSrc(item.thumbnail) + '" alt="">';
    var tagsHtml = (item.tags || []).map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('');
    var starHtml = item.featured ? ' <span class="featured-star">⭐</span>' : '';
    div.innerHTML = '<span class="drag-handle">⋮⋮</span>' + thumbHtml +
      '<div class="item-info"><strong>' + item.title + starHtml + '</strong><div class="meta"><span>' + (item.date||'') + '</span><span class="tags-row">' + tagsHtml + '</span></div></div>' +
      '<div class="btns"><button>预览</button><button>编辑</button><button class="del-btn">删除</button></div>';

    div.querySelector('.drag-handle').addEventListener('dragstart', function(e){ dragSrc = i; div.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    div.querySelector('.drag-handle').addEventListener('dragend', function(){ div.classList.remove('dragging'); });
    div.addEventListener('dragover', function(e){ e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', function(){ div.classList.remove('drag-over'); });
    div.addEventListener('drop', function(e){ e.preventDefault(); div.classList.remove('drag-over'); reorderGallery(items, dragSrc, i, type); });

    div.querySelector('button:first-child').onclick = function(){ openPreview(item); };
    div.querySelector('button:nth-child(2)').onclick = function(){ openEdit(item, type); };
    div.querySelector('.del-btn').onclick = function(){ if(confirm('确认删除「' + item.title + '」？')){ items.splice(items.indexOf(item), 1); saveData('删除'+type); renderAll(); msg('已删除', true); } };
    el.appendChild(div);
  });
}

function reorderGallery(items, from, to, type) {
  var item = items.splice(from, 1)[0];
  items.splice(to, 0, item);
  items.forEach(function(it, i){ it.order = i; });
  saveData('排序'+type); renderAll(); msg('已排序', true);
}

// ===== 编辑弹窗 =====
function openEdit(item, type) {
  editing = { item: item, type: type };
  var form = document.getElementById('edit-form');
  form.title.value = item.title || '';
  form.desc.value = item.desc || '';
  form.url.value = item.url || '';
  form.thumbnail.value = item.thumbnail || '';
  form.date.value = item.date || '';
  form.tags.value = (item.tags || []).join(', ');
  form.featured.checked = item.featured || false;
  document.getElementById('edit-upload-status').classList.remove('show');
  document.getElementById('edit-file').value = '';
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('show'); editing = null; }

document.getElementById('edit-form').onsubmit = async function(e) {
  e.preventDefault();
  if (!editing) return;
  var form = e.target;
  var item = editing.item;
  item.title = form.title.value.trim();
  item.desc = form.desc.value.trim();
  item.url = form.url.value.trim();
  item.thumbnail = form.thumbnail.value.trim();
  item.date = form.date.value.trim();
  item.tags = form.tags.value.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
  item.featured = form.featured.checked;
  if (!item.title) return msg('标题不能为空', false);
  await saveData('更新' + editing.type);
  closeModal(); renderAll(); msg('已保存', true);
};
document.getElementById('modal-bg').onclick = function(e){ if(e.target===this) closeModal(); };

// ===== 预览 =====
function openPreview(item) {
  var bg = document.getElementById('preview-bg');
  var isVid = /\.(mp4|mov|avi|mkv|webm|flv)/i.test(item.thumbnail);
  document.getElementById('preview-title').textContent = item.title;
  document.getElementById('preview-content').innerHTML = isVid
    ? '<video src="' + thumbSrc(item.thumbnail) + '" controls autoplay></video>'
    : '<img src="' + thumbSrc(item.thumbnail) + '" alt="' + item.title + '">';
  bg.classList.add('show');
}
function closePreview() { document.getElementById('preview-bg').classList.remove('show'); document.getElementById('preview-content').innerHTML = ''; }
document.getElementById('preview-bg').onclick = function(e){ if(e.target===this) closePreview(); };
document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closePreview(); closeModal(); } });

// ===== 简单添加 =====
function addSimple(formId, type, keys) {
  document.getElementById(formId).onsubmit = function(e) {
    e.preventDefault(); var form = e.target;
    var item = {};
    keys.forEach(function(k){ item[k] = form[k].value.trim(); });
    if (type === 'skills') item.width = parseInt(item.width) || 0;
    data.site[type].push(item);
    saveData('添加'+type); form.reset(); renderAll(); msg('已添加', true);
  };
}
addSimple('info-add-form', 'info', ['label','value']);
addSimple('skill-add-form', 'skills', ['name','level','width']);
addSimple('project-add-form', 'projects', ['title','desc','chip']);

// ===== 画廊添加 =====
['video','photo','creation'].forEach(function(type) {
  var input = document.getElementById(type + '-file');
  var statusEl = document.getElementById(type + '-upload-status');
  var form = document.getElementById(type + '-form');
  input.onchange = function(){ uploadFile(input, statusEl, form.thumbnail); };
  form.onsubmit = async function(e) {
    e.preventDefault();
    var item = {
      title: form.title.value.trim(), desc: form.desc.value.trim(),
      thumbnail: form.thumbnail.value.trim(), url: form.url.value.trim(),
      date: form.date.value.trim(),
      tags: form.tags.value.split(',').map(function(s){ return s.trim(); }).filter(Boolean),
      featured: form.featured.checked,
      order: (data[type + 's'] || []).length
    };
    if (!item.title) return msg('标题不能为空', false);
    data[type + 's'].push(item);
    await saveData('添加' + type);
    form.reset();
    form.thumbnail.value = type === 'video' ? 'images/placeholder-video.svg' : 'images/placeholder-photo.svg';
    form.tags.value = ''; form.date.value = ''; form.featured.checked = false;
    statusEl.classList.remove('show');
    renderAll(); msg('已添加', true);
  };
});

document.getElementById('edit-file').onchange = function() {
  uploadFile(this, document.getElementById('edit-upload-status'), document.getElementById('edit-form').thumbnail);
};

// ===== 站点表单保存 =====
document.getElementById('site-form').onsubmit = async function(e) {
  e.preventDefault();
  data.site.avatar = this.avatar.value.trim();
  data.site.name = this.name.value.trim();
  data.site.tagline = this.tagline.value.trim();
  await saveData('更新基本信息'); msg('基本信息已保存', true);
};
document.getElementById('about-text-form').onsubmit = async function(e) {
  e.preventDefault();
  data.site.about[0] = this.p1.value.trim();
  data.site.about[1] = this.p2.value.trim();
  await saveData('更新关于'); msg('关于已保存', true);
};
document.getElementById('contact-form').onsubmit = async function(e) {
  e.preventDefault();
  data.site.contact.intro = this.intro.value.trim();
  data.site.contact.email = this.email.value.trim();
  data.site.contact.phone = this.phone.value.trim();
  await saveData('更新联系'); msg('联系方式已保存', true);
};
document.getElementById('footer-form').onsubmit = async function(e) {
  e.preventDefault();
  data.site.footer.name = this.name.value.trim();
  data.site.footer.school = this.school.value.trim();
  data.site.footer.year = this.year.value.trim();
  await saveData('更新页脚'); msg('页脚已保存', true);
};

// 头像上传
document.getElementById('avatar-file').onchange = function() {
  uploadFile(this, document.getElementById('avatar-upload-status'), document.getElementById('site-form').avatar);
};

load();
</script>
